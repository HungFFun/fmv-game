<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Năm Trái Tim Dưới Một Mái Nhà — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        /* Mobile: tắt highlight khi chạm, không cho chọn text (game) */
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      /* #root = khung app, kích thước = pixel THẬT của vùng nhìn (đo bằng JS, tránh lỗi vh/vw
         trên mobile do thanh địa chỉ). Cũng là container-query context để stage 16:9 scale theo. */
      #root {
        position: fixed;
        top: 0;
        left: 0;
        width: var(--app-w, 100vw);
        height: var(--app-h, 100vh);
        container-type: size;
        overflow: hidden;
      }
      /* Mobile cầm DỌC → xoay nội dung sang NGANG lấp đầy màn hình (chạy cả iOS Safari). */
      @media (orientation: portrait) and (pointer: coarse) {
        #root {
          top: 50%;
          left: 50%;
          width: var(--app-h, 100vh); /* xoay: bề rộng khung = chiều cao màn hình */
          height: var(--app-w, 100vw);
          transform: translate(-50%, -50%) rotate(90deg);
          transform-origin: center center;
        }
      }
      /* Loading tổng — hiện NGAY khi HTML parse (trước khi bundle JS tải xong).
         main.js sẽ fade-out + gỡ bỏ sau khi React render xong. */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Gradient chéo xanh dương → hồng theo Figma Background_01 (dùng màu, không dùng ảnh) */
        background: linear-gradient(120deg, #17acf6 0%, #6e86ec 52%, #f65fcf 100%);
        opacity: 1;
        transition: opacity 0.35s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .ring {
        width: clamp(40px, 12vmin, 64px);
        aspect-ratio: 1;
        border-radius: 50%;
        border: 6px solid rgba(255, 255, 255, 0.55);
        border-top-color: #fb3797;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      /* Đo vùng nhìn thấy THẬT (px) trước khi render → khung khớp chính xác màn hình,
         không bị cắt cạnh / giật khi thanh địa chỉ mobile ẩn-hiện. */
      (function () {
        function setSize() {
          var d = document.documentElement;
          d.style.setProperty('--app-w', window.innerWidth + 'px');
          d.style.setProperty('--app-h', window.innerHeight + 'px');
        }
        setSize();
        window.addEventListener('resize', setSize);
        window.addEventListener('orientationchange', function () {
          setSize();
          setTimeout(setSize, 300); // đọc lại sau khi xoay xong (giá trị ổn định)
        });
      })();
    </script>
  </head>
  <body>
    <!-- Loading tổng: sibling của #root, main.js fade-out sau khi app render xong -->
    <div id="app-loader"><div class="ring"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
