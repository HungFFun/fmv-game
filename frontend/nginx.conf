server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cho phép import content lớn qua admin (PUT .../content)
    client_max_body_size 100m;

    # SPA: mọi route không phải file tĩnh → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API của Director → backend (giữ cookie uid, header thật)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Media (video ký HMAC) → backend; hỗ trợ range để tua video
    location /media/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Cache asset tĩnh có hash (Vite)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
